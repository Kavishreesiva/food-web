apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: food-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-web
  template:
    metadata:
      labels:
        app: food-web
    spec:
      containers:
      - name: food-web
        image: <DOCKER_USERNAME>/food-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
  strategy:
    canary:
      steps:
      - setWeight: 50
      - pause: { duration: 10 }
      - analysis:
          templates:
          - templateName: success-rate-check
      - setWeight: 100
