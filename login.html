<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crave Kitchen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4e 100%);
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo .logo {
            justify-content: center;
            font-size: 2rem;
        }
        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .auth-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .auth-form .form-group {
            margin-bottom: 20px;
        }
        .auth-form label {
            display: block;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .auth-form input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e4e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .auth-form input:focus {
            border-color: #ff6b35;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }
        .auth-form .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .auth-divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            position: relative;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e8e4e0;
        }
        .auth-divider::before {
            left: 0;
        }
        .auth-divider::after {
            right: 0;
        }
        .social-login {
            display: flex;
            gap: 15px;
        }
        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e8e4e0;
            border-radius: 12px;
            background: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .social-btn:hover {
            border-color: #ff6b35;
            background: #fff5f0;
        }
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }
        .auth-footer a {
            color: #ff6b35;
            font-weight: 600;
        }
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
        }
        .forgot-password {
            color: #ff6b35;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🔥</span>
                    <span class="logo-text">Crave Kitchen</span>
                </a>
            </div>
            <h1 class="auth-title">Welcome Back!</h1>
            <p class="auth-subtitle">Login to your account to continue</p>
            
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            
            <div class="auth-divider">or continue with</div>
            
            <div class="social-login">
                <button class="social-btn">📘 Facebook</button>
                <button class="social-btn">📸 Instagram</button>
            </div>
            
            <p class="auth-footer">Don't have an account? <a href="register.html">Register Now</a></p>
        </div>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            // If no name was stored from registration, use the part of email before @
            if (!localStorage.getItem('crave_user')) {
                localStorage.setItem('crave_user', email.split('@')[0]);
            }
            alert('Login successful! Redirecting to home...');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
