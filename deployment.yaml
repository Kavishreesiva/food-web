apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: static-app
  template:
    metadata:
      labels:
        app: static-app
    spec:
      containers:
      - name: static-container
        image: my-static-app
        imagePullPolicy: Never
        ports:
        - containerPort: 80













