apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-web
  template:
    metadata:
      labels:
        app: food-web
    spec:
      containers:
      - name: food-web
        image: mikasa15/food-web:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 80
